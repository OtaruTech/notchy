name: Notchy
options:
  bundleIdPrefix: tech.otaru
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true
settings:
  SWIFT_VERSION: "6.0"
  SWIFT_STRICT_CONCURRENCY: complete
  ENABLE_HARDENED_RUNTIME: YES
  CODE_SIGN_STYLE: Automatic
  MARKETING_VERSION: "0.1.0"
  CURRENT_PROJECT_VERSION: "1"

packages:
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: "1.17.0"

targets:
  Notchy:
    type: application
    platform: macOS
    sources:
      - path: Notchy
        excludes:
          - "Resources/MediaControl/**"
      # Bundle the media-control CLI + its perl adapter + framework as a folder
      # reference so the directory structure is preserved (`bin/`, `lib/`, `Frameworks/`)
      # which the CLI uses to find its sibling resources via relative paths.
      # The folder itself becomes Resources/MediaControl/ inside the .app.
      - path: Notchy/Resources/MediaControl
        type: folder
    info:
      path: Notchy/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        LSUIElement: true
        NSBluetoothAlwaysUsageDescription: "Notchy reads connected AirPods battery levels to display them in the notch."
        NSCalendarsUsageDescription: "Notchy shows your upcoming events in the notch panel."
        NSCameraUsageDescription: "Notchy's Mirror widget previews your camera so you can check yourself before a video call."
        NSHumanReadableCopyright: "© 2026"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: tech.otaru.Notchy
      MACOSX_DEPLOYMENT_TARGET: "14.0"
      ARCHS: arm64
      CODE_SIGN_ENTITLEMENTS: Notchy/Notchy.entitlements

  NotchyTests:
    type: bundle.unit-test
    platform: macOS
    sources: [NotchyTests]
    dependencies:
      - target: Notchy
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: tech.otaru.NotchyTests
      MACOSX_DEPLOYMENT_TARGET: "14.0"
      GENERATE_INFOPLIST_FILE: YES

  NotchySnapshotTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: NotchySnapshotTests
        excludes:
          - "__Snapshots__/**"
    dependencies:
      - target: Notchy
      - package: SnapshotTesting
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: tech.otaru.NotchySnapshotTests
      MACOSX_DEPLOYMENT_TARGET: "14.0"
      GENERATE_INFOPLIST_FILE: YES
